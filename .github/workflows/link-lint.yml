name: Link Lint

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee on key docs
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --no-progress
            --verbose
            README.md
            dependencies.md
            naming_conventions.md
            tidy_data_guide.md
            schema/glossary.md
            skills/*.md
            skills/**/*.md
            custom-gpt-pack/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
